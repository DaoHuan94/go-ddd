services:
  postgres:
    image: postgres:16-alpine
    container_name: go-ddd-postgres
    restart: unless-stopped
    ports:
      - "5555:5432"
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: go-ddd-redis
    restart: unless-stopped
    ports:
      - "6666:6379"
    volumes:
      - redis_data:/data
    # Ensure Redis persists changes to disk (in addition to periodic RDB snapshots).
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
